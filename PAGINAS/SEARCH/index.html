<html lang="pt-BR" data-theme="light">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="theme-color" content="#000000" />
		<title>📦 Busca Inteligente de Pacotes</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="styles.css" />
	</head>
	<body>
		<div id="progressBar" style="width: 0"></div>

		<!-- HEADER -->
		<header id="header" data-testid="header">
			<div id="logo">
				<span>📦</span>
				<span class="logo-text">PackSearch</span>
			</div>
			<div id="search-wrap">
				<svg
					width="16"
					height="16"
					viewBox="0 0 24 24"
					fill="none"
					stroke="currentColor"
					stroke-width="2"
				>
					<circle cx="11" cy="11" r="8" />
					<path d="m21 21-4.35-4.35" />
				</svg>
				<input
					type="text"
					id="globalSearch"
					data-testid="global-search"
					placeholder='Busca: "frase exata" -excluir id:123 svc:SMG2 tramo:ONWAY'
					autocomplete="off"
					spellcheck="false"
				/>
			</div>
			<div class="header-actions">
				<div id="cacheBadge" data-testid="cache-badge">
					Cache: vazio
				</div>
				<label
					id="uploadLabel"
					for="fileInput"
					data-testid="upload-label"
				>
					<svg
						width="15"
						height="15"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="2.5"
					>
						<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
						<polyline points="17 8 12 3 7 8" />
						<line x1="12" y1="3" x2="12" y2="15" />
					</svg>
					Importar
				</label>
				<input type="file" id="fileInput" multiple accept=".csv,.txt" />
				<button
					class="btn btn-danger"
					id="clearBtn"
					data-testid="clear-btn"
				>
					<svg
						width="14"
						height="14"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="2.5"
					>
						<polyline points="3 6 5 6 21 6" />
						<path
							d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"
						/>
						<path d="M10 11v6M14 11v6" />
						<path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />
					</svg>
					Limpar
				</button>
				<button
					class="btn-icon"
					id="themeBtn"
					title="Alternar tema"
					data-testid="theme-btn"
				>
					<svg
						id="themeIcon"
						width="16"
						height="16"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="2"
					>
						<path
							d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"
						/>
					</svg>
				</button>
			</div>
		</header>

		<!-- LAYOUT -->
		<div id="layout">
			<!-- SIDEBAR -->
			<aside id="sidebar" data-testid="sidebar">
				<div class="filter-section">
					<div class="filter-title">
						<svg
							width="12"
							height="12"
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2.5"
						>
							<circle cx="11" cy="11" r="8" />
							<path d="m21 21-4.35-4.35" />
						</svg>
						Pesquisa rápida
					</div>
					<div class="quick-search-wrap">
						<svg
							width="13"
							height="13"
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2"
						>
							<circle cx="11" cy="11" r="8" />
							<path d="m21 21-4.35-4.35" />
						</svg>
						<input
							type="text"
							id="quickSearch"
							data-testid="quick-search"
							placeholder="Filtrar resultados..."
							autocomplete="off"
						/>
					</div>
				</div>
				<div
					class="filter-section"
					id="chipsSection"
					style="display: none"
				>
					<div class="filter-title">Filtros ativos</div>
					<div id="activeChips"></div>
				</div>
				<div class="filter-section">
					<div class="filter-title">
						<svg
							width="12"
							height="12"
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2.5"
						>
							<rect x="2" y="3" width="20" height="14" rx="2" />
							<line x1="8" y1="21" x2="16" y2="21" />
							<line x1="12" y1="17" x2="12" y2="21" />
						</svg>
						SVC
					</div>
					<div class="checklist" id="svcChecklist"></div>
				</div>
				<div class="filter-section">
					<div class="filter-title">
						<svg
							width="12"
							height="12"
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2.5"
						>
							<path
								d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"
							/>
						</svg>
						Tramo
					</div>
					<div class="checklist" id="tramoChecklist"></div>
				</div>
				<div class="filter-section">
					<div class="filter-title">
						<svg
							width="12"
							height="12"
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2.5"
						>
							<circle cx="12" cy="12" r="10" />
							<polyline points="12 6 12 12 16 14" />
						</svg>
						Status
					</div>
					<div class="checklist" id="statusChecklist"></div>
				</div>
				<div class="filter-section">
					<div class="filter-title">
						<svg
							width="12"
							height="12"
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2.5"
						>
							<rect x="3" y="4" width="18" height="18" rx="2" />
							<line x1="16" y1="2" x2="16" y2="6" />
							<line x1="8" y1="2" x2="8" y2="6" />
							<line x1="3" y1="10" x2="21" y2="10" />
						</svg>
						Data de Atualização
					</div>
					<div class="date-range">
						<label
							>De
							<input
								type="date"
								id="dateFrom"
								data-testid="date-from"
						/></label>
						<label
							>Até
							<input
								type="date"
								id="dateTo"
								data-testid="date-to"
						/></label>
					</div>
				</div>
				<div class="filter-section">
					<div class="filter-title">
						<svg
							width="12"
							height="12"
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2.5"
						>
							<line x1="12" y1="1" x2="12" y2="23" />
							<path
								d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"
							/>
						</svg>
						Valor USD
					</div>
					<div class="usd-range">
						<input
							type="number"
							id="usdMin"
							data-testid="usd-min"
							placeholder="Min"
							min="0"
							step="0.01"
						/>
						<span class="usd-sep">—</span>
						<input
							type="number"
							id="usdMax"
							data-testid="usd-max"
							placeholder="Máx"
							min="0"
							step="0.01"
						/>
					</div>
				</div>
				<div class="filter-section">
					<div class="filter-title">
						<svg
							width="12"
							height="12"
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2.5"
						>
							<line x1="8" y1="6" x2="21" y2="6" />
							<line x1="8" y1="12" x2="21" y2="12" />
							<line x1="8" y1="18" x2="21" y2="18" />
						</svg>
						Itens por página
					</div>
					<select id="pageSize" data-testid="page-size">
						<option value="12">12 itens</option>
						<option value="24" selected>24 itens</option>
						<option value="48">48 itens</option>
						<option value="96">96 itens</option>
					</select>
				</div>
				<div class="filter-section">
					<button
						class="btn btn-ghost"
						style="width: 100%; justify-content: center"
						id="resetFiltersBtn"
						data-testid="reset-filters-btn"
					>
						<svg
							width="14"
							height="14"
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2.5"
						>
							<polyline points="1 4 1 10 7 10" />
							<path d="M3.51 15a9 9 0 1 0 .49-4.36" />
						</svg>
						Resetar filtros
					</button>
				</div>
			</aside>

			<!-- MAIN -->
			<main id="main">
				<div id="mainToolbar">
					<div id="resultCount" data-testid="result-count">
						Nenhum item carregado
					</div>
					<span id="debugToggle" style="display: none">🐛 Debug</span>
					<!-- VIEW TOGGLE -->
					<div id="viewToggle" data-testid="view-toggle">
						<button
							class="view-btn active"
							id="gridViewBtn"
							title="Visualização em grade"
							data-testid="grid-view-btn"
						>
							<svg
								width="16"
								height="16"
								viewBox="0 0 24 24"
								fill="none"
								stroke="currentColor"
								stroke-width="2"
							>
								<rect x="3" y="3" width="7" height="7" />
								<rect x="14" y="3" width="7" height="7" />
								<rect x="3" y="14" width="7" height="7" />
								<rect x="14" y="14" width="7" height="7" />
							</svg>
						</button>
						<button
							class="view-btn"
							id="listViewBtn"
							title="Visualização em lista"
							data-testid="list-view-btn"
						>
							<svg
								width="16"
								height="16"
								viewBox="0 0 24 24"
								fill="none"
								stroke="currentColor"
								stroke-width="2"
							>
								<line x1="8" y1="6" x2="21" y2="6" />
								<line x1="8" y1="12" x2="21" y2="12" />
								<line x1="8" y1="18" x2="21" y2="18" />
								<line x1="3" y1="6" x2="3.01" y2="6" />
								<line x1="3" y1="12" x2="3.01" y2="12" />
								<line x1="3" y1="18" x2="3.01" y2="18" />
							</svg>
						</button>
					</div>
					<select id="sortSelect" data-testid="sort-select">
						<option value="relevance">Relevância</option>
						<option value="date_desc">Data: mais recente</option>
						<option value="date_asc">Data: mais antigo</option>
						<option value="id_asc">ID: crescente</option>
						<option value="id_desc">ID: decrescente</option>
						<option value="desc_az">Descrição: A–Z</option>
						<option value="usd_desc">Valor USD: maior</option>
						<option value="usd_asc">Valor USD: menor</option>
						<option value="eta_desc">ETA: maior</option>
					</select>
				</div>
				<div id="debugPanel"></div>
				<div id="cardsGrid" data-testid="cards-grid"></div>
				<div id="pagination" data-testid="pagination"></div>
			</main>
		</div>

		<!-- CONFIRMATION MODAL -->
		<div
			id="confirmModal"
			class="modal-overlay"
			style="display: none"
			data-testid="confirm-modal"
		>
			<div class="modal-box">
				<div class="modal-icon">⚠️</div>
				<h3
					class="modal-title"
					id="modalTitle"
					data-testid="modal-title"
				>
					Confirmar
				</h3>
				<p
					class="modal-message"
					id="confirmMessage"
					data-testid="confirm-message"
				></p>
				<div class="modal-actions">
					<button
						class="btn btn-ghost"
						id="modalCancelBtn"
						data-testid="modal-cancel-btn"
					>
						Cancelar
					</button>
					<button
						class="btn btn-danger"
						id="modalConfirmBtn"
						data-testid="modal-confirm-btn"
					>
						Limpar
					</button>
				</div>
			</div>
		</div>

		<div id="toastContainer"></div>

		<!-- React root (mantido para compatibilidade) -->
		<noscript>You need to enable JavaScript to run this app.</noscript>
		<div id="root"></div>

		<!-- PackSearch JavaScript -->
		<script src="app.js"></script>
	</body>
</html>
