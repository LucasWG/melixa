<!doctype html>
<html lang="pt-BR">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Gerador de Etiquetas</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
	<style>
		:root {
			--meli-yellow: #ffe600;
			--meli-yellow-dark: #f0d800;
			--meli-blue: #3483fa;
			--meli-blue-dark: #2968c8;
			--meli-green: #00a650;
			--meli-bg: #f5f5f5;
			--meli-sidebar: #1a1a2e;
			--meli-text: #333333;
			--meli-border: #e0e0e0;
			--meli-card: #ffffff;
			--meli-shadow: 0 2px 16px rgba(0, 0, 0, 0.1);
		}

		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		body {
			font-family:
				"Segoe UI",
				system-ui,
				-apple-system,
				sans-serif;
			background: var(--meli-bg);
			color: var(--meli-text);
			display: flex;
			min-height: 100vh;
		}

		/* ══════════════════ SIDEBAR ══════════════════ */
		#sidebar {
			width: 270px;
			min-width: 270px;
			background: var(--meli-sidebar);
			display: flex;
			flex-direction: column;
			position: fixed;
			top: 0;
			left: 0;
			bottom: 0;
			z-index: 100;
			box-shadow: 4px 0 24px rgba(0, 0, 0, 0.18);
		}

		.sidebar-logo {
			background: var(--meli-yellow);
			padding: 22px 20px 18px;
			display: flex;
			align-items: center;
			gap: 12px;
		}

		.sidebar-logo .logo-icon {
			width: 40px;
			height: 40px;
			background: var(--meli-sidebar);
			border-radius: 10px;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 20px;
			flex-shrink: 0;
		}

		.sidebar-logo .logo-text {
			font-size: 15px;
			font-weight: 800;
			color: var(--meli-sidebar);
			line-height: 1.2;
		}

		.sidebar-logo .logo-sub {
			font-size: 11px;
			font-weight: 500;
			color: #555;
		}

		.sidebar-section {
			padding: 18px 16px 6px;
			font-size: 10px;
			font-weight: 700;
			letter-spacing: 1.4px;
			text-transform: uppercase;
			color: #8899bb;
		}

		.sidebar-form {
			padding: 0 14px;
			flex: 1;
			overflow-y: auto;
		}

		.form-group {
			margin-bottom: 14px;
		}

		.form-group label {
			display: block;
			font-size: 11px;
			font-weight: 600;
			color: #99aac0;
			margin-bottom: 5px;
			letter-spacing: 0.5px;
			text-transform: uppercase;
		}

		.form-group input {
			width: 100%;
			padding: 10px 13px;
			background: #243050;
			border: 1.5px solid #2e4070;
			border-radius: 8px;
			color: #e8f0ff;
			font-size: 14px;
			font-weight: 500;
			outline: none;
			transition:
				border 0.2s,
				background 0.2s;
		}

		.form-group input:focus {
			border-color: var(--meli-blue);
			background: #1e3060;
		}

		.form-group input::placeholder {
			color: #506080;
		}

		.sidebar-divider {
			height: 1px;
			background: #243050;
			margin: 8px 14px 14px;
		}

		.btn-generate {
			margin: 0 14px 10px;
			padding: 13px;
			background: var(--meli-yellow);
			color: var(--meli-sidebar);
			font-size: 14px;
			font-weight: 800;
			border: none;
			border-radius: 10px;
			cursor: pointer;
			width: calc(100% - 28px);
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 8px;
			transition:
				background 0.18s,
				transform 0.12s,
				box-shadow 0.2s;
			box-shadow: 0 3px 12px rgba(255, 230, 0, 0.25);
		}

		.btn-generate:hover {
			background: var(--meli-yellow-dark);
			transform: translateY(-1px);
		}

		.btn-print {
			margin: 0 14px 10px;
			padding: 12px;
			background: var(--meli-blue);
			color: #fff;
			font-size: 14px;
			font-weight: 700;
			border: none;
			border-radius: 10px;
			cursor: pointer;
			width: calc(100% - 28px);
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 8px;
			transition:
				background 0.18s,
				transform 0.12s;
		}

		.btn-print:hover {
			background: var(--meli-blue-dark);
			transform: translateY(-1px);
		}

		.btn-print:disabled {
			opacity: 0.5;
			cursor: not-allowed;
		}

		.btn-reset {
			margin: 0 14px 20px;
			padding: 10px;
			background: transparent;
			color: #778899;
			font-size: 12px;
			font-weight: 600;
			border: 1.5px solid #2e4070;
			border-radius: 8px;
			cursor: pointer;
			width: calc(100% - 28px);
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 6px;
			transition: all 0.18s;
		}

		.btn-reset:hover {
			border-color: #f44;
			color: #f66;
		}

		.sidebar-status {
			margin: 0 14px 16px;
			padding: 10px 13px;
			background: #1a3050;
			border-radius: 8px;
			border-left: 3px solid var(--meli-green);
			font-size: 12px;
			color: #88ccaa;
			display: flex;
			align-items: center;
			gap: 8px;
		}

		.sidebar-status.empty {
			border-left-color: #556;
			color: #667788;
		}

		.shortcut-hint {
			margin: 0 14px 14px;
			font-size: 10px;
			color: #445566;
			text-align: center;
		}

		.shortcut-hint kbd {
			background: #243050;
			border: 1px solid #2e4070;
			padding: 2px 6px;
			border-radius: 4px;
			font-size: 10px;
			color: #8899bb;
		}

		.sidebar-form::-webkit-scrollbar {
			width: 4px;
		}

		.sidebar-form::-webkit-scrollbar-thumb {
			background: #2e4070;
			border-radius: 4px;
		}

		/* ══════════════════ MAIN ══════════════════ */
		#main {
			margin-left: 270px;
			flex: 1;
			display: flex;
			flex-direction: column;
			min-height: 100vh;
		}

		.topbar {
			background: #fff;
			border-bottom: 1px solid var(--meli-border);
			padding: 0 32px;
			height: 62px;
			display: flex;
			align-items: center;
			justify-content: space-between;
			position: sticky;
			top: 0;
			z-index: 50;
			box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
		}

		.topbar-breadcrumb {
			font-size: 13px;
			color: #888;
			display: flex;
			align-items: center;
			gap: 6px;
		}

		.topbar-breadcrumb span:last-child {
			color: var(--meli-text);
			font-weight: 600;
		}

		.topbar-badge {
			background: var(--meli-yellow);
			color: var(--meli-sidebar);
			font-size: 11px;
			font-weight: 800;
			padding: 3px 10px;
			border-radius: 20px;
		}

		.content {
			padding: 28px 32px;
			flex: 1;
		}

		/* Empty State */
		#empty-state {
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			min-height: 60vh;
			gap: 16px;
			text-align: center;
		}

		.empty-icon {
			width: 90px;
			height: 90px;
			background: #eef2ff;
			border-radius: 50%;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 40px;
		}

		#empty-state h2 {
			font-size: 22px;
			color: #333;
			font-weight: 700;
		}

		#empty-state p {
			font-size: 14px;
			color: #888;
			max-width: 320px;
			line-height: 1.6;
		}

		/* Grid */
		#labels-grid {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
			gap: 20px;
		}

		/* Card tela */
		.label-card {
			background: var(--meli-card);
			border-radius: 14px;
			box-shadow: var(--meli-shadow);
			overflow: hidden;
			transition:
				transform 0.18s,
				box-shadow 0.18s;
			border: 1.5px solid transparent;
			cursor: pointer;
			animation: cardIn 0.3s ease both;
		}

		.label-card:hover {
			transform: translateY(-3px);
			box-shadow: 0 8px 30px rgba(52, 131, 250, 0.15);
			border-color: var(--meli-blue);
		}

		.card-header {
			background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
			padding: 12px 16px;
			display: flex;
			align-items: center;
			justify-content: space-between;
		}

		.card-counter {
			font-size: 11px;
			color: #8899bb;
			font-weight: 600;
		}

		.card-dot {
			width: 8px;
			height: 8px;
			background: var(--meli-green);
			border-radius: 50%;
			box-shadow: 0 0 6px var(--meli-green);
		}

		.card-body {
			padding: 16px;
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 14px;
		}

		.card-title {
			font-size: 12px;
			font-weight: 700;
			color: #666;
			text-transform: uppercase;
			letter-spacing: 1px;
			text-align: center;
		}

		.card-qr {
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 10px;
			background: #f9fafb;
			border-radius: 10px;
			border: 1.5px solid #eee;
		}

		.card-qr canvas {
			display: block;
		}

		.card-qr img {
			display: none;
		}

		.card-id {
			background: var(--meli-yellow);
			color: var(--meli-sidebar);
			font-size: 14px;
			font-weight: 800;
			padding: 8px 18px;
			border-radius: 8px;
			width: 100%;
			text-align: center;
		}

		.card-footer {
			padding: 10px 16px;
			background: #fafafa;
			border-top: 1px solid #f0f0f0;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 11px;
			color: #aaa;
		}

		/* Summary */
		.summary-bar {
			display: flex;
			align-items: center;
			gap: 20px;
			margin-bottom: 22px;
			background: #fff;
			border-radius: 12px;
			padding: 16px 22px;
			box-shadow: var(--meli-shadow);
		}

		.summary-item {
			display: flex;
			flex-direction: column;
			gap: 2px;
		}

		.s-label {
			font-size: 11px;
			color: #999;
			text-transform: uppercase;
			letter-spacing: 0.8px;
			font-weight: 600;
		}

		.s-value {
			font-size: 20px;
			font-weight: 800;
			color: var(--meli-sidebar);
		}

		.summary-sep {
			width: 1px;
			height: 36px;
			background: #eee;
		}

		.summary-prefix-badge {
			background: #eef2ff;
			color: var(--meli-blue);
			font-size: 13px;
			font-weight: 700;
			padding: 5px 14px;
			border-radius: 20px;
		}

		/* Toast */
		#toast {
			position: fixed;
			bottom: 30px;
			right: 30px;
			background: #1a1a2e;
			color: #fff;
			padding: 13px 20px;
			border-radius: 10px;
			font-size: 13px;
			font-weight: 600;
			box-shadow: 0 6px 24px rgba(0, 0, 0, 0.25);
			display: flex;
			align-items: center;
			gap: 10px;
			z-index: 9999;
			transform: translateY(80px);
			opacity: 0;
			transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
		}

		#toast.show {
			transform: translateY(0);
			opacity: 1;
		}

		@keyframes cardIn {
			from {
				opacity: 0;
				transform: translateY(18px);
			}

			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		/* ══════════════════════════════════════════════
       BLOCOS DE IMPRESSÃO — ocultos na tela por padrão
    ══════════════════════════════════════════════ */

		/* TELA: esconde todos os blocos de impressão */
		.print-logo-block,
		.print-title-block,
		.print-id-block,
		.print-qr-block {
			display: none !important;
		}

		/* ══════════════════════════════════════════════
       @media print — só o que importa para impressão
    ══════════════════════════════════════════════ */
		@media print {

			/* Oculta interface */
			#sidebar,
			.topbar,
			.summary-bar,
			#empty-state,
			.card-header,
			.card-footer,
			#toast,
			.card-title,
			.card-qr,
			.card-id {
				display: none !important;
			}

			html,
			body {
				margin: 0 !important;
				padding: 0 !important;
				background: #fff !important;
			}

			#main {
				margin-left: 0 !important;
			}

			.content {
				padding: 0 !important;
			}

			#labels-grid {
				display: block !important;
			}

			/* Uma etiqueta por página A4 */
			.label-card {
				width: 210mm !important;
				min-height: 297mm !important;
				page-break-after: always !important;
				break-after: page !important;
				border: none !important;
				border-radius: 0 !important;
				box-shadow: none !important;
				background: #fff !important;
				display: flex !important;
				flex-direction: column !important;
				align-items: stretch !important;
				justify-content: flex-start !important;
				padding: 0 !important;
				animation: none !important;
				transform: none !important;
				overflow: visible !important;
			}

			.label-card:last-child {
				page-break-after: avoid !important;
				break-after: avoid !important;
			}

			.card-body {
				flex: 1 !important;
				display: flex !important;
				flex-direction: column !important;
				align-items: center !important;
				justify-content: flex-start !important;
				padding: 0 !important;
				gap: 0 !important;
				width: 100% !important;
			}

			/* ── Exibe os blocos de impressão ── */
			.print-logo-block,
			.print-title-block,
			.print-id-block,
			.print-qr-block {
				display: flex !important;
			}

			/* ── BLOCO 1: Logo ── */
			.print-logo-block {
				width: 100%;
				align-items: center !important;
				justify-content: flex-start !important;
				padding: 18mm 14mm 10mm !important;
			}

			.print-logo-block img {
				height: 28mm !important;
				width: auto !important;
				object-fit: contain !important;
			}

			/* ── BLOCO 2: Faixa preta — Título ── */
			.print-title-block {
				width: 100%;
				background: #000 !important;
				-webkit-print-color-adjust: exact !important;
				print-color-adjust: exact !important;
				padding: 10mm 14mm !important;
				align-items: center !important;
				justify-content: center !important;
			}

			.print-title-block span {
				color: #fff !important;
				font-size: 22pt !important;
				font-weight: 800 !important;
				letter-spacing: 1px;
				text-align: center;
				text-transform: uppercase;
				font-family: "Segoe UI", Arial, sans-serif;
			}

			/* ── BLOCO 3: Faixa branca — ID ── */
			.print-id-block {
				width: 100%;
				background: #fff !important;
				border-top: 3px solid #000 !important;
				border-bottom: 3px solid #000 !important;
				padding: 8mm 14mm !important;
				align-items: center !important;
				justify-content: center !important;
			}

			.print-id-block span {
				color: #000 !important;
				font-size: 22pt !important;
				font-weight: 800 !important;
				letter-spacing: 2px;
				text-align: center;
				font-family: "Courier New", monospace;
			}

			/* ── BLOCO 4: QR Code — apenas o print-qr-block ── */
			.print-qr-block {
				width: 100%;
				align-items: center !important;
				justify-content: center !important;
				padding: 14mm 14mm 0 !important;
			}

			.print-qr-block canvas {
				display: none !important;
			}

			.print-qr-block img {
				display: block !important;
				width: 90mm !important;
				height: 90mm !important;
			}
		}
	</style>
</head>

<body>
	<!-- ═══════════ SIDEBAR ═══════════ -->
	<aside id="sidebar">
		<div class="sidebar-logo">
			<div class="logo-icon">🏷️</div>
			<div>
				<div class="logo-text">Gerador de Etiquetas</div>
				<div class="logo-sub">SMG2 · Label Studio</div>
			</div>
		</div>

		<div class="sidebar-section">Configurações</div>

		<div class="sidebar-form">
			<div class="form-group">
				<label>Título da Etiqueta</label>
				<input type="text" id="labelTitle" value="PACOTES SEM ID - SALVADOS" placeholder="Ex: PACOTES SEM ID" />
			</div>
			<div class="form-group">
				<label>Prefixo do ID</label>
				<input type="text" id="labelPrefix" value="SEMID_SMG2_" placeholder="Ex: SEMID_SMG2_" />
			</div>
			<div class="form-group">
				<label>ID Inicial</label>
				<input type="number" id="startId" value="251" min="1" placeholder="Ex: 1" />
			</div>
			<div class="form-group">
				<label>Quantidade</label>
				<input type="number" id="quantity" value="10" min="1" max="500" placeholder="Ex: 10" />
			</div>
			<div class="sidebar-divider"></div>
		</div>

		<div id="sidebar-status" class="sidebar-status empty">
			<span>📭</span>
			<span>Nenhuma etiqueta gerada</span>
		</div>

		<button class="btn-generate" onclick="generateLabels()">
			<span>⚡</span> Gerar e Salvar
		</button>
		<button class="btn-print" id="btn-print" onclick="window.print()" disabled>
			<span>🖨️</span> Imprimir Agora
		</button>
		<button class="btn-reset" onclick="resetAll()">
			<span>↺</span> Resetar Configurações
		</button>
		<div class="shortcut-hint">
			<kbd>Alt</kbd> + <kbd>0</kbd> → Resetar configurações
		</div>
	</aside>

	<!-- ═══════════ MAIN ═══════════ -->
	<div id="main">
		<header class="topbar">
			<span class="topbar-breadcrumb">
				<span>SMG2</span><span>›</span><span>Gerador de Etiquetas</span>
			</span>
			<span id="topbar-count-badge" style="display: none" class="topbar-badge"></span>
		</header>

		<div class="content">
			<div id="empty-state">
				<div class="empty-icon">🏷️</div>
				<h2>Nenhuma etiqueta gerada</h2>
				<p>
					Configure o prefixo, ID inicial e quantidade no painel
					lateral e clique em <strong>Gerar e Salvar</strong>.
				</p>
			</div>

			<div class="summary-bar" id="summary-bar" style="display: none">
				<div class="summary-item">
					<span class="s-label">Total</span>
					<span class="s-value" id="sum-total">0</span>
				</div>
				<div class="summary-sep"></div>
				<div class="summary-item">
					<span class="s-label">Intervalo</span>
					<span class="s-value" style="font-size: 14px" id="sum-range">—</span>
				</div>
				<div class="summary-sep"></div>
				<div class="summary-item">
					<span class="s-label">Prefixo</span>
					<span id="sum-prefix" class="summary-prefix-badge">—</span>
				</div>
			</div>

			<div id="labels-grid"></div>
		</div>
	</div>

	<div id="toast">
		<span>✅</span>
		<span id="toast-msg"></span>
	</div>

	<script>
		const STORAGE_KEY = "semid_labels_config";

		(function loadConfig() {
			try {
				const c = JSON.parse(
					localStorage.getItem(STORAGE_KEY) || "null",
				);
				if (!c) return;
				if (c.title)
					document.getElementById("labelTitle").value = c.title;
				if (c.prefix)
					document.getElementById("labelPrefix").value = c.prefix;
				if (c.startId)
					document.getElementById("startId").value = c.startId;
				if (c.quantity)
					document.getElementById("quantity").value = c.quantity;
				if (c.generated) generateLabels(true);
			} catch (e) { }
		})();

		function generateLabels(silent = false) {
			const title =
				document.getElementById("labelTitle").value.trim() ||
				"ETIQUETA";
			const prefix =
				document.getElementById("labelPrefix").value.trim() ||
				"ID_";
			const startId =
				parseInt(document.getElementById("startId").value) || 1;
			const quantity = Math.min(
				parseInt(document.getElementById("quantity").value) || 1,
				500,
			);

			localStorage.setItem(
				STORAGE_KEY,
				JSON.stringify({
					title,
					prefix,
					startId,
					quantity,
					generated: true,
				}),
			);

			const grid = document.getElementById("labels-grid");
			grid.innerHTML = "";

			document.getElementById("empty-state").style.display = "none";
			document.getElementById("summary-bar").style.display = "flex";
			document.getElementById("sum-total").textContent = quantity;
			document.getElementById("sum-range").textContent =
				`${prefix}${startId} → ${prefix}${startId + quantity - 1}`;
			document.getElementById("sum-prefix").textContent = prefix;

			const status = document.getElementById("sidebar-status");
			status.className = "sidebar-status";
			status.innerHTML = `<span>✅</span><span>${quantity} etiqueta${quantity > 1 ? "s" : ""} gerada${quantity > 1 ? "s" : ""}</span>`;

			document.getElementById("btn-print").disabled = false;
			const badge = document.getElementById("topbar-count-badge");
			badge.style.display = "inline-block";
			badge.textContent = `${quantity} etiqueta${quantity > 1 ? "s" : ""}`;

			for (let i = 0; i < quantity; i++) {
				const id = `${prefix}${startId + i}`;
				const card = createCard(id, title, i + 1, quantity);
				card.style.animationDelay = `${i * 40}ms`;
				grid.appendChild(card);

				setTimeout(() => {
					/* QR tela */
					generateQR(card.querySelector(".card-qr"), id, 128);
					/* QR impressão — tamanho maior para boa resolução */
					generateQR(
						card.querySelector(".print-qr-block"),
						id,
						400,
					);
				}, i * 20);
			}

			if (!silent)
				showToast(
					`⚡ ${quantity} etiqueta${quantity > 1 ? "s" : ""} gerada${quantity > 1 ? "s" : ""} com sucesso!`,
				);
		}

		function generateQR(container, text, size) {
			container.innerHTML = "";
			try {
				new QRCode(container, {
					text,
					width: size,
					height: size,
					colorDark: "#000000",
					colorLight: "#ffffff",
					correctLevel: QRCode.CorrectLevel.H,
				});
			} catch (e) {
				container.innerHTML = `<div style="width:${size}px;height:${size}px;background:#eee;display:flex;align-items:center;justify-content:center;color:#888;font-size:12px;">QR</div>`;
			}
		}

		function createCard(id, title, index, total) {
			const card = document.createElement("div");
			card.className = "label-card";
			card.innerHTML = `
        <!-- Cabeçalho tela -->
        <div class="card-header">
          <span class="card-counter">Etiqueta ${index} de ${total}</span>
          <span class="card-dot"></span>
        </div>

        <div class="card-body">
          <!-- TELA -->
          <div class="card-title">${escHtml(title)}</div>
          <div class="card-qr"></div>
          <div class="card-id">${escHtml(id)}</div>

          <!-- IMPRESSÃO (ocultos na tela via CSS) -->
          <div class="print-logo-block">
            <img src="mercado_livre.png" alt="Mercado Livre"/>
          </div>
          <div class="print-title-block">
            <span>${escHtml(title)}</span>
          </div>
          <div class="print-id-block">
            <span>${escHtml(id)}</span>
          </div>
          <div class="print-qr-block"></div>
        </div>

        <!-- Rodapé tela -->
        <div class="card-footer">🏷️ Clique para copiar ID</div>
      `;
			card.addEventListener("click", () => copyToClipboard(id, card));
			return card;
		}

		function resetAll() {
			if (!confirm("Resetar todas as configurações?")) return;
			localStorage.removeItem(STORAGE_KEY);
			["labelTitle", "labelPrefix", "startId", "quantity"].forEach(
				(id) => (document.getElementById(id).value = ""),
			);
			document.getElementById("labels-grid").innerHTML = "";
			document.getElementById("empty-state").style.display = "flex";
			document.getElementById("summary-bar").style.display = "none";
			document.getElementById("topbar-count-badge").style.display =
				"none";
			document.getElementById("btn-print").disabled = true;
			const s = document.getElementById("sidebar-status");
			s.className = "sidebar-status empty";
			s.innerHTML = `<span>📭</span><span>Nenhuma etiqueta gerada</span>`;
			showToast("↺ Configurações resetadas");
		}

		function copyToClipboard(text, card) {
			navigator.clipboard
				.writeText(text)
				.then(() => {
					card.style.borderColor = "var(--meli-green)";
					setTimeout(
						() => (card.style.borderColor = "transparent"),
						1200,
					);
					showToast(`📋 Copiado: ${text}`);
				})
				.catch(() => { });
		}

		function showToast(msg) {
			const t = document.getElementById("toast");
			document.getElementById("toast-msg").textContent = msg;
			t.classList.add("show");
			clearTimeout(t._to);
			t._to = setTimeout(() => t.classList.remove("show"), 3000);
		}

		function escHtml(s) {
			return s
				.replace(/&/g, "&amp;")
				.replace(/</g, "&lt;")
				.replace(/>/g, "&gt;")
				.replace(/"/g, "&quot;");
		}

		document.addEventListener("keydown", (e) => {
			if (e.altKey && e.key === "0") {
				e.preventDefault();
				resetAll();
			}
			if (e.altKey && e.key === "p") {
				e.preventDefault();
				window.print();
			}
			if (e.altKey && e.key === "g") {
				e.preventDefault();
				generateLabels();
			}
		});
	</script>
</body>

</html>
